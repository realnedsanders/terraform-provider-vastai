name: Tests
on:
  pull_request:
    branches: [main]
    paths-ignore:
      - 'README.md'
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true
      - run: go mod download
      - run: go build -v ./...
      - name: Run linters
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.11
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true
      - run: go mod download
      - run: go test -v -count=1 -parallel=4 -timeout 120s ./...
  acceptance:
    name: Acceptance Tests
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    needs: build
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true
      - run: go mod download
      - run: go test -v -count=1 -parallel=4 -timeout 120m ./...
        env:
          TF_ACC: "1"
          VASTAI_API_KEY: ${{ secrets.VASTAI_API_KEY }}
  sweep:
    name: Sweep Test Resources
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: acceptance
    if: always() && github.ref == 'refs/heads/main' && needs.acceptance.result != 'skipped'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true
      - run: go mod download
      - run: make sweep
        env:
          VASTAI_API_KEY: ${{ secrets.VASTAI_API_KEY }}
